name: axiom-llm-connectors
version: 0.1.0
language: python
description: LLM connector nodes for Anthropic and OpenAI, including streaming chat and text embeddings.
author: Axiom
license: MIT
nodes:
    - name: PromptBuilder
      input: ChatMessage
      output: FormattedPrompt
      description: Formats a user chat message into a structured prompt with a system instruction.
    - name: AnthropicConnector
      input: FormattedPrompt
      output: TokenChunk
      type: pipeline
      description: Calls the Anthropic Messages API with streaming enabled and yields one TokenChunk per token.
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: EmbeddingGenerator
      input: EmbeddingRequest
      output: EmbeddingVector
      type: pipeline
      description: Calls the OpenAI embeddings API for each input frame and streams one EmbeddingVector per frame.
      required_secrets:
        - OPENAI_API_KEY
    - name: ContextBuilder
      input: RetrievalContext
      output: FormattedPrompt
      description: Formats retrieved document chunks and a user question into a structured prompt for an LLM.
